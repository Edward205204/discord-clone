version: "3.8"

services:
  # --- PostgreSQL (Drizzle ORM sẽ chọc vào đây) ---
  postgres:
    image: postgres:15-alpine
    container_name: chat_system_pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-chat_system_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- MongoDB (Mongoose sẽ chọc vào đây) ---
  mongodb:
    image: mongo:6.0
    container_name: chat_system_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # --- Redis (Dùng cho User Cache & Socket Adapter) ---
  redis:
    image: redis:7-alpine
    container_name: chat_system_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
  mongodata:
